services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: recsys
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d recsys"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  migrate:
    build: .
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/recsys
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/recsys
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
